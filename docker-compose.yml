version: '3.8'

services:

  # ====== Base de données MySQL ======
  mysql:
    image: mysql:8.0
    container_name: reclamations-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reclamations
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - reclamations-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====== Backend Spring Boot ======
  backend:
    build:
      context: ./reclamations-backend
      dockerfile: Dockerfile
    container_name: reclamations-backend
    ports:
      - "9096:9096"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/reclamations?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - reclamations-network

  # ====== Frontend Angular (Nginx) ======
  frontend:
    build:
      context: ./reclamations-frontend
      dockerfile: Dockerfile
    container_name: reclamations-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - reclamations-network

networks:
  reclamations-network:
    driver: bridge

volumes:
  mysql_data:
