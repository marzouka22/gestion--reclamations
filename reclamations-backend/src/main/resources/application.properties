server.port=9096
spring.datasource.url=jdbc:mysql://localhost:3306/reclamations?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garde la session Hibernate ouverte pendant la sérialisation JSON
# Nécessaire pour les champs FetchType.LAZY (ex: Reclamation.agent)
spring.jpa.open-in-view=true
